{% extends 'Shop/base.html' %}

{% block body %}
<div class="container mt-4">
    <h2>Checkout</h2>
    <div class="row">
        <div class="col-md-8">
            <div class="card">
                <div class="card-body">
                    <h5 class="card-title">Cart Items</h5>
                    <div id="item-list">
                        <!-- Items will be loaded here via JavaScript -->
                    </div>
                    <div class="mt-3">
                        <h6><strong>Total:</strong> ₹<span id="total-display">0</span></h6>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <form method="post">
        {% csrf_token %}
        <input type="hidden" id="items" name="items">
        <input type="hidden" id="hidden-total" name="total">
        <div class="form-row">
            <div class="form-group col-md-6">
                <label for="name">Name</label>
                <input type="text" class="form-control" id="name" name="name" placeholder="Name">
              </div>
          <div class="form-group col-md-6">
            <label for="email">Email</label>
            <input type="email" class="form-control" id="email" name="email" placeholder="Email">
          </div>
        </div>
        <div class="form-group">
          <label for="address">Address</label>
          <input type="text" class="form-control" id="address" name="address" placeholder="1234 Main St">
        </div>
        <div class="form-row">
          <div class="form-group col-md-6">
            <label for="city">City</label>
            <input type="text" class="form-control" id="city" name="city">
          </div>
          <div class="form-group col-md-4">
            <label for="state">State</label>
            <input id="state" class="form-control" name="state">
          </div>
          <div class="form-group col-md-2">
            <label for="zip">Zip</label>
            <input type="text" class="form-control" id="zip" name="zip">
          </div>
        </div>
        <button type="submit" class="btn btn-primary" id="submitBtn">Place Order</button>
      </form>
</div>

<script>
    $(document).ready(function() {
        let cart = localStorage.getItem('cart') ? JSON.parse(localStorage.getItem('cart')) : {};
        let itemList = $('#item-list');
        let total = 0;
        
        for (let itemId in cart) {
            let item = cart[itemId];
            itemList.append(`
                <div class="cart-item mb-2">
                    <strong>${item[1]}</strong> - Qty: ${item[0]}
                </div>
            `);
            total += parseFloat(cart[itemId][2]);
        }
        
        if (Object.keys(cart).length === 0) {
            itemList.html('<p>Your cart is empty</p>');
        }

        $('#items').val(JSON.stringify(cart));
        $('#hidden-total').val(total);
        document.getElementById('total-display').innerHTML = total;
    });
</script>
{% endblock %}
